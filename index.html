<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INSANE PANEL</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:
radial-gradient(circle at top,
#1a0000,
#070707 40%);
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* LOGIN */

#loginScreen{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(10px);
}

.login-box{
width:430px;
background:rgba(20,20,20,.9);
padding:35px;
border-radius:30px;
border:1px solid rgba(255,255,255,.05);
box-shadow:
0 0 40px rgba(255,0,0,.15);
backdrop-filter:blur(15px);
}

.login-logo{
font-size:70px;
font-weight:900;
font-style:italic;
color:#ff0000;
text-align:center;
text-shadow:
0 0 15px red,
0 0 40px rgba(255,0,0,.5);
}

.login-sub{
text-align:center;
color:#777;
margin-top:5px;
margin-bottom:30px;
letter-spacing:2px;
}

.login-box input{
width:100%;
padding:18px;
background:#111;
border:none;
border-radius:18px;
margin-bottom:15px;
color:white;
font-size:15px;
outline:none;
border:1px solid rgba(255,255,255,.04);
}

.login-box input:focus{
border:1px solid rgba(255,0,0,.5);
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(
45deg,
#ff0000,
#ff3b3b
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:
0 0 20px rgba(255,0,0,.25);
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:
0 0 30px rgba(255,0,0,.45);
}

/* SIDEBAR */

.sidebar{
width:280px;
background:rgba(10,10,10,.95);
backdrop-filter:blur(15px);
padding:25px;
display:flex;
flex-direction:column;
border-right:
1px solid rgba(255,255,255,.05);
}

.logo{
font-size:60px;
font-style:italic;
font-weight:900;
color:#ff0000;
text-shadow:
0 0 10px red,
0 0 30px rgba(255,0,0,.4);
}

.sublogo{
font-size:13px;
color:#666;
margin-top:5px;
margin-bottom:40px;
letter-spacing:2px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
background:#141414;
border:none;
padding:18px;
border-radius:18px;
color:white;
font-size:15px;
text-align:left;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,.04);
}

.menu button:hover{
background:#ff0000;
transform:translateX(5px);
box-shadow:
0 0 20px rgba(255,0,0,.3);
}

.menu i{
margin-right:10px;
}

.profile{
margin-top:auto;
background:#141414;
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,.04);
}

.profile h3{
color:#ff4444;
font-size:22px;
}

.profile p{
margin-top:5px;
color:#777;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.page{
display:none;
animation:fade .25s ease;
}

.page.active{
display:block;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.title{
font-size:50px;
font-style:italic;
margin-bottom:25px;
}

.title span{
color:#ff0000;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat{
background:rgba(18,18,18,.9);
padding:25px;
border-radius:25px;
border:1px solid rgba(255,255,255,.05);
box-shadow:
0 0 25px rgba(255,0,0,.08);
}

.stat p{
color:#777;
font-size:14px;
margin-bottom:10px;
}

.stat h2{
font-size:40px;
color:#ff2e2e;
}

/* CARD */

.card{
background:rgba(20,20,20,.8);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.05);
padding:25px;
border-radius:28px;
margin-bottom:20px;
box-shadow:
0 0 30px rgba(255,0,0,.08);
}

.card h2{
font-size:30px;
font-style:italic;
margin-bottom:20px;
}

.card label{
display:block;
margin-bottom:10px;
color:#777;
}

.card select{
width:100%;
padding:16px;
background:#0d0d0d;
border:none;
border-radius:15px;
color:white;
outline:none;
margin-bottom:15px;
border:1px solid rgba(255,255,255,.04);
}

.generate{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(
45deg,
#ff0000,
#ff3b3b
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:
0 0 20px rgba(255,0,0,.25);
}

.generate:hover{
transform:translateY(-2px);
box-shadow:
0 0 30px rgba(255,0,0,.45);
}

.lastkey{
margin-top:25px;
background:#0d0d0d;
padding:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,.04);
}

.lastkey p{
color:#666;
font-size:13px;
}

.lastkey h3{
margin-top:10px;
font-size:28px;
color:#00ff88;
}

/* KEYS */

.keylist{
display:flex;
flex-direction:column;
gap:15px;
}

.key{
background:
linear-gradient(
145deg,
#161616,
#0d0d0d
);
padding:20px;
border-radius:22px;
border:1px solid rgba(255,255,255,.04);
transition:.3s;
}

.key:hover{
transform:translateY(-3px);
box-shadow:
0 0 25px rgba(255,0,0,.12);
}

.keytop{
display:flex;
justify-content:space-between;
align-items:center;
}

.keycode{
font-size:18px;
font-weight:bold;
color:#00ff88;
}

.info{
margin-top:10px;
color:#777;
font-size:14px;
}

.btns{
display:flex;
gap:10px;
}

.smallbtn{
padding:10px 15px;
border:none;
border-radius:12px;
font-size:12px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.pause{
background:#3b2c00;
color:#ffaa00;
}

.play{
background:#003d1c;
color:#00ff88;
}

.delete{
background:#220000;
color:#ff4444;
}

.smallbtn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div id="loginScreen">

<div class="login-box">

<div class="login-logo">
INSANE
</div>

<div class="login-sub">
OWNER PANEL
</div>

<input
type="text"
id="user"
placeholder="Usuário"
/>

<input
type="password"
id="pass"
placeholder="Senha"
/>

<button
class="login-btn"
onclick="login()">
ENTRAR
</button>

</div>

</div>

<div class="sidebar">

<div>

<div class="logo">
INSANE
</div>

<div class="sublogo">
OWNER PANEL
</div>

<div class="menu">

<button onclick="mostrarPagina('dashboard')">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</button>

<button onclick="mostrarPagina('gerar')">
<i class="fa-solid fa-key"></i>
Gerar Keys
</button>

<button onclick="mostrarPagina('keys')">
<i class="fa-solid fa-list"></i>
Todas Keys
</button>

</div>

</div>

<div class="profile">

<h3>OWNER</h3>

<p>Sistema Online</p>

</div>

</div>

<div class="content">

<div class="page active" id="dashboard">

<div class="title">
INSANE <span>DASHBOARD</span>
</div>

<div class="stats">

<div class="stat">
<p>TOTAL KEYS</p>
<h2 id="totalKeys">0</h2>
</div>

<div class="stat">
<p>KEYS ATIVAS</p>
<h2 id="keysAtivas">0</h2>
</div>

<div class="stat">
<p>KEYS PAUSADAS</p>
<h2 id="keysPausadas">0</h2>
</div>

<div class="stat">
<p>SISTEMA</p>
<h2>ONLINE</h2>
</div>

</div>

</div>

<div class="page" id="gerar">

<div class="title">
GERAR <span>KEYS</span>
</div>

<div class="card">

<h2>NOVA KEY</h2>

<label>Duração</label>

<select id="dias">

<option value="1">1 DIA</option>
<option value="7">7 DIAS</option>
<option value="15">15 DIAS</option>
<option value="30">30 DIAS</option>
<option value="999">LIFETIME</option>

</select>

<button
class="generate"
onclick="gerarKey()">
GERAR KEY
</button>

<div class="lastkey">

<p>ÚLTIMA KEY</p>

<h3 id="ultimakey">
INSANE-00000
</h3>

</div>

</div>

</div>

<div class="page" id="keys">

<div class="title">
TODAS <span>KEYS</span>
</div>

<div class="keylist" id="listaKeys"></div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://oalyokjoixouwywxfmtz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_kg2nublKacXnCFQWQaA0QA_jv1C_-Hp";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* LOGIN */

function login(){

let user =
document.getElementById("user").value;

let pass =
document.getElementById("pass").value;

if(
user == "insane" &&
pass == "cheats"
){

document.getElementById("loginScreen")
.style.display = "none";

carregarDashboard();
carregarKeys();

}else{

alert("Login inválido");

}

}

/* MENU */

function mostrarPagina(id){

document
.querySelectorAll(".page")
.forEach(p => {

p.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

if(id == "keys"){

carregarKeys();

}

if(id == "dashboard"){

carregarDashboard();

}

}

/* GERAR KEY */

async function gerarKey(){

let dias =
document.getElementById("dias").value;

let numero =
Math.floor(
10000 + Math.random() * 90000
);

let key =
"INSANE-" + numero;

const { error } =
await supabaseClient
.from("keys")
.insert([
{
key:key,
duracao:
dias == 999
? "INFINITO"
: dias + " DIAS",
paused:false,
deleted:false
}
]);

if(error){

alert("Erro ao gerar key");
console.log(error);
return;

}

document.getElementById("ultimakey")
.innerHTML = key;

carregarKeys();
carregarDashboard();

}

/* DASHBOARD */

async function carregarDashboard(){

const { data, error } =
await supabaseClient
.from("keys")
.select("*");

if(error){

console.log(error);
return;

}

let total = 0;
let pausadas = 0;
let ativas = 0;

data.forEach(k => {

if(k.deleted) return;

total++;

if(k.paused){

pausadas++;

}else{

ativas++;

}

});

document.getElementById("totalKeys")
.innerHTML = total;

document.getElementById("keysAtivas")
.innerHTML = ativas;

document.getElementById("keysPausadas")
.innerHTML = pausadas;

}

/* KEYS */

async function carregarKeys(){

const { data, error } =
await supabaseClient
.from("keys")
.select("*")
.order("id",{ascending:false});

if(error){

console.log(error);
return;

}

const area =
document.getElementById("listaKeys");

area.innerHTML = "";

data.forEach(item => {

if(item.deleted) return;

area.innerHTML += `

<div class="key">

<div class="keytop">

<div>

<div class="keycode">
${item.key}
</div>

<div class="info">
${item.duracao}
</div>

<div class="info">
Status:
${item.paused
? 'PAUSADA'
: 'ATIVA'}
</div>

</div>

<div class="btns">

<button
class="smallbtn ${
item.paused
? 'play'
: 'pause'
}"
onclick="togglePause('${item.key}', ${item.paused})">

${
item.paused
? 'PLAY'
: 'PAUSE'
}

</button>

<button
class="smallbtn delete"
onclick="deletar('${item.key}')">

DELETE

</button>

</div>

</div>

</div>

`;

});

}

/* PAUSAR */

async function togglePause(key, paused){

await supabaseClient
.from("keys")
.update({
paused:!paused
})
.eq("key",key);

carregarKeys();
carregarDashboard();

}

/* DELETE */

async function deletar(key){

await supabaseClient
.from("keys")
.update({
deleted:true
})
.eq("key",key);

carregarKeys();
carregarDashboard();

}

</script>

</body>
</html>
