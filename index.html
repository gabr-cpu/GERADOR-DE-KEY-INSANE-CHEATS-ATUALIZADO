<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INSANE PANEL</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070707;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:15px 20px;
border-radius:15px;
border:1px solid red;
display:none;
z-index:9999;
}

/* LOGIN */

#loginScreen{
position:fixed;
width:100%;
height:100%;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
width:420px;
background:#111;
padding:35px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,0,0.2);
}

.login-logo{
font-size:60px;
font-weight:900;
font-style:italic;
color:#ff0000;
text-align:center;
text-shadow:0 0 15px red;
}

.login-sub{
text-align:center;
color:#666;
margin-top:5px;
margin-bottom:30px;
}

.login-box input,
.login-box select{
width:100%;
padding:16px;
background:#181818;
border:none;
border-radius:15px;
margin-bottom:15px;
color:white;
font-size:15px;
outline:none;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0000,#ff3333);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.switch{
display:flex;
gap:10px;
margin-bottom:20px;
}

/* MENU */

.sidebar{
width:260px;
background:#111;
padding:20px;
display:flex;
flex-direction:column;
border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:50px;
font-style:italic;
font-weight:900;
color:#ff0000;
text-shadow:0 0 15px red;
}

.sublogo{
font-size:13px;
color:#666;
margin-top:5px;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
background:#181818;
border:none;
padding:18px;
border-radius:15px;
color:white;
font-size:15px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:#ff0000;
transform:translateX(5px);
}

.menu i{
margin-right:10px;
}

.profile{
margin-top:auto;
background:#181818;
padding:18px;
border-radius:18px;
}

.profile h3{
color:#ff4444;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
}

.page{
display:none;
}

.page.active{
display:block;
}

.title{
font-size:45px;
font-style:italic;
margin-bottom:25px;
}

.title span{
color:#ff0000;
}

/* CARD */

.card{
background:#141414;
padding:25px;
border-radius:25px;
}

.card h2{
font-size:30px;
font-style:italic;
margin-bottom:20px;
}

.card label{
display:block;
margin-bottom:10px;
color:#777;
}

.card input,
.card select{
width:100%;
padding:16px;
background:#0d0d0d;
border:none;
border-radius:15px;
color:white;
outline:none;
margin-bottom:15px;
}

.generate{
width:100%;
padding:17px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0000,#ff3333);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.lastkey{
margin-top:25px;
background:#0d0d0d;
padding:20px;
border-radius:18px;
}

.lastkey p{
color:#666;
font-size:13px;
}

.lastkey h3{
margin-top:10px;
font-size:28px;
color:#ff0000;
}

.key{
background:#141414;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.keytop{
display:flex;
justify-content:space-between;
align-items:center;
}

.keycode{
font-size:18px;
font-weight:bold;
color:#00ff88;
}

.info{
margin-top:10px;
color:#777;
font-size:14px;
}

.btns{
display:flex;
gap:8px;
}

.smallbtn{
padding:8px 14px;
border:none;
border-radius:10px;
font-size:12px;
font-weight:bold;
cursor:pointer;
}

.pause{
background:#3b2c00;
color:#ffaa00;
}

.play{
background:#003d1c;
color:#00ff88;
}

.delete{
background:#220000;
color:#ff4444;
}

.creditos{
margin-top:15px;
font-size:18px;
color:#00ff88;
}

</style>
</head>

<body>

<div id="toast"></div>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<div class="login-logo">
INSANE
</div>

<div class="login-sub">
PAINEL ADMIN
</div>

<div class="switch">

<button
class="login-btn"
onclick="abrirAdm()">
ADM
</button>

<button
class="login-btn"
onclick="abrirVendedor()">
VENDEDOR
</button>

</div>

<div id="admArea">

<input
type="text"
id="user"
placeholder="Usuário"
/>

<input
type="password"
id="pass"
placeholder="Senha"
/>

<button
class="login-btn"
onclick="loginAdm()">
ENTRAR
</button>

</div>

<div id="vendedorArea" style="display:none;">

<input
type="text"
id="vuser"
placeholder="Usuário"
/>

<input
type="password"
id="vpass"
placeholder="Senha"
/>

<div style="display:flex;gap:10px;">

<button
class="login-btn"
onclick="registrarVendedor()">
CRIAR
</button>

<button
class="login-btn"
onclick="loginVendedor()">
LOGIN
</button>

</div>

</div>

</div>

</div>

<!-- MENU -->

<div class="sidebar">

<div>

<div class="logo">
INSANE
</div>

<div class="sublogo">
PAINEL ADMIN
</div>

<div class="menu">

<button onclick="mostrarPagina('gerar')">
<i class="fa-solid fa-key"></i>
Gerar Keys
</button>

<button onclick="mostrarPagina('keys')">
<i class="fa-solid fa-list"></i>
Minhas Keys
</button>

<button
id="btnVendedores"
onclick="mostrarPagina('vendedores')">

<i class="fa-solid fa-users"></i>
Gerenciar Vendedores

</button>

</div>

</div>

<div class="profile">

<h3 id="perfilNome">
ADMIN
</h3>

<p id="perfilCreditos"
style="margin-top:5px;color:#777;">
Sistema Online
</p>

</div>

</div>

<!-- CONTEÚDO -->

<div class="content">

<div class="page active" id="gerar">

<div class="title">
GERAR <span>KEYS</span>
</div>

<div class="card">

<h2>NOVA KEY</h2>

<label>Escolha a duração</label>

<select id="dias">

<option value="1">
1 DIA - 10 CRÉDITOS
</option>

<option value="7">
7 DIAS - 25 CRÉDITOS
</option>

<option value="10">
10 DIAS - 30 CRÉDITOS
</option>

<option value="30">
30 DIAS - 50 CRÉDITOS
</option>

</select>

<button
class="generate"
onclick="gerarKey()">
GERAR KEY
</button>

<div class="creditos" id="creditosArea"></div>

<div class="lastkey">

<p>ÚLTIMA KEY</p>

<h3 id="ultimakey">
INSANE-00000
</h3>

</div>

</div>

</div>

<div class="page" id="keys">

<div class="title">
MINHAS <span>KEYS</span>
</div>

<div id="listaKeys"></div>

</div>

<div class="page" id="vendedores">

<div class="title">
VENDEDORES
</div>

<div id="listaVendedores"></div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://oalyokjoixouwywxfmtz.supabase.co";

const SUPABASE_KEY =
"COLOCA_SUA_KEY";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let vendedorLogado = null;
let admin = false;

function mostrarMensagem(texto){

const toast =
document.getElementById("toast");

toast.innerHTML = texto;

toast.style.display = "block";

setTimeout(() => {

toast.style.display = "none";

},3000);

}

/* TELAS */

function abrirAdm(){

document.getElementById("admArea")
.style.display = "block";

document.getElementById("vendedorArea")
.style.display = "none";

}

function abrirVendedor(){

document.getElementById("admArea")
.style.display = "none";

document.getElementById("vendedorArea")
.style.display = "block";

}

/* LOGIN ADM */

function loginAdm(){

let user =
document.getElementById("user").value;

let pass =
document.getElementById("pass").value;

if(
user == "insane" &&
pass == "cheats"
){

admin = true;

document.getElementById("loginScreen")
.style.display = "none";

document.getElementById("perfilNome")
.innerHTML = "ADMIN";

document.getElementById("creditosArea")
.innerHTML =
"CRÉDITOS ILIMITADOS";

carregarVendedores();
carregarKeys();

}else{

mostrarMensagem("Login inválido");

}

}

/* REGISTRAR */

async function registrarVendedor(){

let usuario =
document.getElementById("vuser").value;

let senha =
document.getElementById("vpass").value;

const { data } =
await supabaseClient
.from("vendedores")
.select("*")
.eq("usuario",usuario);

if(data.length > 0){

mostrarMensagem("Usuário existe");

return;

}

await supabaseClient
.from("vendedores")
.insert([
{
usuario,
senha,
creditos:0
}
]);

mostrarMensagem("Conta criada");

}

/* LOGIN */

async function loginVendedor(){

let usuario =
document.getElementById("vuser").value;

let senha =
document.getElementById("vpass").value;

const { data } =
await supabaseClient
.from("vendedores")
.select("*")
.eq("usuario",usuario)
.eq("senha",senha);

if(data.length == 0){

mostrarMensagem("Conta inválida");

return;

}

vendedorLogado = data[0];

document.getElementById("loginScreen")
.style.display = "none";

document.getElementById("btnVendedores")
.style.display = "none";

document.getElementById("perfilNome")
.innerHTML =
vendedorLogado.usuario;

document.getElementById("perfilCreditos")
.innerHTML =
vendedorLogado.creditos +
" créditos";

document.getElementById("creditosArea")
.innerHTML =
"SEUS CRÉDITOS: " +
vendedorLogado.creditos;

await carregarKeys();

mostrarPagina("keys");

}

/* MENU */

function mostrarPagina(id){

document
.querySelectorAll(".page")
.forEach(pagina => {

pagina.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

}

/* GERAR */

async function gerarKey(){

let dias =
document.getElementById("dias").value;

let preco = 0;

if(dias == 1) preco = 10;
if(dias == 7) preco = 25;
if(dias == 10) preco = 30;
if(dias == 30) preco = 50;

if(!admin){

if(vendedorLogado.creditos < preco){

mostrarMensagem("Sem créditos");

return;

}

let novoCredito =
vendedorLogado.creditos - preco;

await supabaseClient
.from("vendedores")
.update({
creditos:novoCredito
})
.eq("id",vendedorLogado.id);

vendedorLogado.creditos =
novoCredito;

document.getElementById("perfilCreditos")
.innerHTML =
novoCredito + " créditos";

}

let numero =
Math.floor(
10000 + Math.random() * 90000
);

let codigo =
"INSANE-" + numero;

const { error } =
await supabaseClient
.from("keys")
.insert([
{
codigo:codigo,
duracao:dias + " DIAS",
paused:false,
deleted:false,
vendedor:
admin
? "ADMIN"
: vendedorLogado.usuario
}
]);

if(error){

console.log(error);

mostrarMensagem("Erro salvar key");

return;

}

document.getElementById("ultimakey")
.innerHTML = codigo;

mostrarMensagem("Key gerada");

await carregarKeys();

mostrarPagina("keys");

}

/* KEYS */

async function carregarKeys(){

const { data } =
await supabaseClient
.from("keys")
.select("*")
.order("id",{ascending:false});

const area =
document.getElementById("listaKeys");

area.innerHTML = "";

data.forEach(item => {

if(item.deleted) return;

if(!admin){

if(item.vendedor != vendedorLogado.usuario)
return;

}

area.innerHTML += `

<div class="key">

<div class="keytop">

<div>

<div class="keycode">
${item.codigo}
</div>

<div class="info">
${item.duracao}
</div>

<div class="info">
${item.vendedor}
</div>

</div>

<div class="btns">

<button
class="smallbtn ${
item.paused
? 'play'
: 'pause'
}"
onclick="togglePause(
'${item.codigo}',
${item.paused}
)">

${
item.paused
? 'PLAY'
: 'PAUSE'
}

</button>

<button
class="smallbtn delete"
onclick="deletar(
'${item.codigo}'
)">
DELETE
</button>

</div>

</div>

</div>

`;

});

}

/* PAUSE */

async function togglePause(codigo,paused){

await supabaseClient
.from("keys")
.update({
paused:!paused
})
.eq("codigo",codigo);

carregarKeys();

}

/* DELETE */

async function deletar(codigo){

await supabaseClient
.from("keys")
.update({
deleted:true
})
.eq("codigo",codigo);

carregarKeys();

}

/* VENDEDORES */

async function carregarVendedores(){

const { data } =
await supabaseClient
.from("vendedores")
.select("*");

const area =
document.getElementById("listaVendedores");

area.innerHTML = "";

data.forEach(v => {

area.innerHTML += `

<div class="key">

<div class="keytop">

<div>

<div class="keycode">
${v.usuario}
</div>

<div class="info">
${v.creditos} créditos
</div>

</div>

<div class="btns">

<button
class="smallbtn play"
onclick="editarCreditos(${v.id},10)">
+10
</button>

<button
class="smallbtn pause"
onclick="editarCreditos(${v.id},-10)">
-10
</button>

</div>

</div>

</div>

`;

});

}

/* CREDITOS */

async function editarCreditos(id,valor){

const { data } =
await supabaseClient
.from("vendedores")
.select("*")
.eq("id",id);

let atual =
data[0].creditos;

await supabaseClient
.from("vendedores")
.update({
creditos: atual + valor
})
.eq("id",id);

carregarVendedores();

}

</script>

</body>
</html>
